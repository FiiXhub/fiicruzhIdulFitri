<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ucapan Idul Fitri</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MUSIC -->
<audio id="music1" src="music1.mp3" loop autoplay muted></audio>
<audio id="music2" src="music2.mp3" loop></audio>

<div class="wrapper">

  <div class="card" id="card">

    <!-- DEPAN -->
    <div class="front" onclick="openCard()">
      <h2>🌙 Tap untuk membuka</h2>
    </div>

    <!-- DALAM -->
    <div class="back">

      <!-- BACKGROUND ANIMASI -->
      <div class="bg-anim"></div>

      <!-- BULAN -->
      <div class="moon"></div>

      <!-- BINTANG -->
      <div class="stars"></div>

      <!-- MASJID -->
      <div class="mosque"></div>

      <!-- FOTO -->
      <img id="foto" class="foto">

      <div class="content">
        <h1>Selamat Hari Raya</h1>
        <h2>Idul Fitri</h2>

        <p class="text">
          🌙 Taqabbalallahu minna wa minkum 🤍<br><br>
          Mohon maaf lahir dan batin 🙏<br><br>
          Semoga Allah melimpahkan kebahagiaan, kesehatan,<br>
          dan keberkahan untuk kita semua 🤲✨
        </p>

        <p class="tahun">1447 H / 2026 M</p>
        <h3 id="nama"></h3>
      </div>

      <button onclick="shareWA()">📤 Share WhatsApp</button>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
